<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RINZO STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="cart.css" />
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-xl navbar-dark bg-black bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="/img/gargoyle_0.png" loading="lazy" alt="Logo" width="50" height="50"
                        class="d-inline-block align-text-top" style="margin-left: 30px;">
                </a>

                <div class="text-center position-absolute top-50 start-50 translate-middle">
                    <a class="navbar-brand mb-0" href="index.html" style="font-size: 24px; font-weight:600;">RINZO</a>
                    <h6 class="sublogo text-secondary" style="font-size: 13px; margin-top: -4px;">Sharp. Subtle. Rinzo
                    </h6>
                </div>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation" style="margin-right: 30px;">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarNavAltMarkup">
                    <div class="navbar-nav me-3">
                        <a class="nav-link active" aria-current="page" href="login.html">Login / Register </a>
                        <a class="nav-link" href="cart.html">🛒Cart</a>
                        <a class="nav-link" href="#">🤍Favorites</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main id="cart-main" class="empty-cart">
        <div class="container">
            <div id="cart-content" class="empty-card text-center">

                <div class="cart-ill" aria-hidden="true">
                    <img src="./img/shopping-bag.png" alt="Empty bag illustration" class="cart-ill-img">
                </div>
                <h3 style="font-weight:600;">Hey, your bag feels so light!</h3>
                <p class="lead">Let's add some items in your bag</p>
                <div class="d-flex justify-content-center">
                    <a href="index.html" class="btn btn-start">START SHOPPING</a>
                </div>

            </div>
        </div>
    </main>

    <footer class="page-footer text-center py-4">
        © Rinzo Store. All rights reserved.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cart.js"></script>
</body>

</html>
